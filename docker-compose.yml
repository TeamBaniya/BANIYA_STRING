version: '3.8'

services:
  string-bot:
    build: .
    container_name: sparsh_baniya_bot
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    # Optional: If you want to use config.py instead of .env
    # volumes:
    #   - ./config.py:/app/config.py
